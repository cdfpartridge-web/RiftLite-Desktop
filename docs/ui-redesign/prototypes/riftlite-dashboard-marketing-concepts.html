  padding: 0;
  outline: none;
  border: 0;

  background: linear-gradient(

  height: 20px;
  margin-top: 4px;

  border-radius: var(--radius-full);

}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;

}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(

svg {

        replay: &quot;Local available · Web waiting&quot;,
        title: &quot;Continue with local tools&quot;,
        copy: &quot;Match history, decks, Scorepad, and Local replays remain available while online services reconnect.&quot;,

    const features = [

      { label: &quot;Featured video&quot;, title: &quot;Latest RiftLite match review&quot;, body: &quot;Video stays click-to-play so embedded media is not created until the user requests it.&quot;, action: &quot;Play preview&quot; },

    let promoIndex = 0;
    let featureIndex = 0;
    let toastTimer = 0;

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = `Prototype: ${message}`;
      toast.hidden = false;
      toastTimer = window.setTimeout(() =&gt; { toast.hidden = true; }, 2600);
    }

    function setButtonState(button, selected) {
      button.setAttribute(&quot;aria-pressed&quot;, String(selected));
      button.classList.toggle(&quot;btn-primary&quot;, selected);
      button.classList.toggle(&quot;btn-ghost&quot;, !selected);
    }

    function setPage(page) {
      const config = pages[page] || pages.home;
      root.dataset.page = page;
      root.querySelectorAll(&quot;[data-rl-view]&quot;).forEach((view) =&gt; {
        view.hidden = view.getAttribute(&quot;data-rl-view&quot;) !== page;
      });
      root.querySelectorAll(&quot;.rl-nav-list [data-rl-page]&quot;).forEach((button) =&gt; {
        setButtonState(button, button.getAttribute(&quot;data-rl-page&quot;) === page);
      });
      pageTitle.textContent = config.title;
      pageSubtitle.textContent = config.subtitle;
      primaryAction.textContent = config.action;
      layoutSelect.disabled = page !== &quot;home&quot;;
      stateSelect.disabled = page !== &quot;home&quot;;
    }

    function setState(key) {
      const state = states[key] || states.ready;
      root.querySelector(&quot;#rl-side-state&quot;).textContent = state.side;
      root.querySelector(&quot;#rl-provider&quot;).textContent = state.provider;
      root.querySelector(&quot;#rl-tracking&quot;).textContent = state.tracking;
      root.querySelector(&quot;#rl-deck-state&quot;).textContent = state.deck;
      root.querySelector(&quot;#rl-replay-state&quot;).textContent = state.replay;
      root.querySelector(&quot;#rl-action-title&quot;).textContent = state.title;
      root.querySelector(&quot;#rl-action-copy&quot;).textContent = state.copy;
      root.querySelector(&quot;#rl-home-action&quot;).textContent = state.action;
      if (state.attention) {
        root.querySelector(&quot;#rl-attention-title&quot;).textContent = state.attention.title;
        root.querySelector(&quot;#rl-attention-copy&quot;).textContent = state.attention.copy;
        attention.hidden = false;
      } else {
        attention.hidden = true;
      }
    }

    function setTheme(theme) {
      const documentRoot = root.ownerDocument.documentElement;
      if (theme === &quot;system&quot;) {
        delete documentRoot.dataset.theme;
      } else {
        documentRoot.dataset.theme = theme;
      }
    }

    function renderPromotion() {
      const item = promotions[promoIndex];
      root.querySelector(&quot;#rl-promo-label&quot;).textContent = item.label;
      root.querySelector(&quot;#rl-promo-title&quot;).textContent = item.title;
      root.querySelector(&quot;#rl-promo-body&quot;).textContent = item.body;
      root.querySelector(&quot;#rl-promo-cta&quot;).textContent = item.action;
      root.querySelector(&quot;#rl-promo-count&quot;).textContent = `${promoIndex + 1} / ${promotions.length}`;
    }

    function renderFeature() {
      const item = features[featureIndex];
      root.querySelector(&quot;#rl-feature-label&quot;).textContent = item.label;
      root.querySelector(&quot;#rl-feature-title&quot;).textContent = item.title;
      root.querySelector(&quot;#rl-feature-body&quot;).textContent = item.body;
      root.querySelector(&quot;#rl-feature-cta&quot;).textContent = item.action;
      root.querySelector(&quot;#rl-feature-count&quot;).textContent = `${featureIndex + 1} / ${features.length}`;
    }

    root.querySelectorAll(&quot;[data-rl-page]&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; setPage(button.getAttribute(&quot;data-rl-page&quot;) || &quot;home&quot;));
    });

    layoutSelect.addEventListener(&quot;change&quot;, () =&gt; {
      root.dataset.layout = layoutSelect.value;
    });

    stateSelect.addEventListener(&quot;change&quot;, () =&gt; setState(stateSelect.value));
    themeSelect.addEventListener(&quot;change&quot;, () =&gt; setTheme(themeSelect.value));

    root.querySelector(&quot;#rl-promo-prev&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      promoIndex = (promoIndex - 1 + promotions.length) % promotions.length;
      renderPromotion();
    });

    root.querySelector(&quot;#rl-promo-next&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      promoIndex = (promoIndex + 1) % promotions.length;
      renderPromotion();
    });

    root.querySelector(&quot;#rl-promo-cta&quot;).addEventListener(&quot;click&quot;, () =&gt; showToast(`${promotions[promoIndex].action} would open through the safe external-link flow.`));

    root.querySelector(&quot;#rl-feature-next&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      featureIndex = (featureIndex + 1) % features.length;
      renderFeature();
    });

    root.querySelector(&quot;#rl-feature-cta&quot;).addEventListener(&quot;click&quot;, () =&gt; showToast(`${features[featureIndex].action} would open or begin click-to-play media.`));

    root.querySelector(&quot;#rl-home-action&quot;).addEventListener(&quot;click&quot;, () =&gt; showToast(states[stateSelect.value].action));
    primaryAction.addEventListener(&quot;click&quot;, () =&gt; showToast(primaryAction.textContent || &quot;Primary action&quot;));

    root.querySelectorAll(&quot;[data-prototype-action]&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; showToast(button.getAttribute(&quot;data-prototype-action&quot;) || &quot;Action&quot;));
    });

    root.querySelectorAll(&quot;[data-review-tab]&quot;).forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; {
        root.querySelectorAll(&quot;[data-review-tab]&quot;).forEach((peer) =&gt; setButtonState(peer, peer === button));
        root.querySelector(&quot;#rl-review-title&quot;).textContent = button.getAttribute(&quot;data-review-tab&quot;) || &quot;Matches&quot;;
      });
    });

    root.querySelector(&quot;#rl-reset&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      layoutSelect.value = &quot;balanced&quot;;
      stateSelect.value = &quot;ready&quot;;
      themeSelect.value = &quot;dark&quot;;
      root.dataset.layout = &quot;balanced&quot;;
      promoIndex = 0;
      featureIndex = 0;
      setState(&quot;ready&quot;);
      setTheme(&quot;dark&quot;);
      renderPromotion();
      renderFeature();
      setPage(&quot;home&quot;);
      showToast(&quot;Sample reset&quot;);
    });

    setPage(&quot;home&quot;);
    setState(&quot;ready&quot;);
    setTheme(&quot;dark&quot;);
    renderPromotion();
    renderFeature();
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

    initialize();

    .getElementById(&quot;codex-visualization-lucide&quot;)
